name: Build CloneMaster APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Extract CloneMaster ZIP
      run: |
        unzip -o CloneMaster_Final.zip
        echo "✅ ZIP extracted"
        ls -la CloneMaster/

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Fix Gradle Wrapper JAR
      working-directory: CloneMaster
      run: |
        chmod +x gradlew
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar \
          "https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar"
        echo "✅ gradle-wrapper.jar size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

    - name: Build Debug APK
      working-directory: CloneMaster
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CloneMaster-Debug-APK
        path: CloneMaster/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: CloneMaster v${{ github.run_number }}
        body: |
          ## CloneMaster APK — Fixes Applied

          ### Bug Fixes
          - ✅ Deploy New Clone crash fix
          - ✅ Apps list blank screen fix
          - ✅ ANR fix
          - ✅ FOREGROUND_SERVICE permission

          ### How to install
          1. Download APK below
          2. Enable "Unknown Sources" on your phone
          3. Install → Open → Clone karo!

        files: CloneMaster/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
